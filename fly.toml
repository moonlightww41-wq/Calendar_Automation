# Fly.io 設定ファイル - LINE Calendar Sync
app = "line-calendar-sync"
primary_region = "nrt"  # 東京リージョン

[build]

[http_service]
  internal_port = 8002
  force_https = true
  auto_stop_machines = false   # 常時起動（スリープしない）
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
